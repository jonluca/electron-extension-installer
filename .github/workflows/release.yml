name: Release npm package

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@^11.15.0 yarn@1.22.22
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: npx --yes semantic-release@25 --branches main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
